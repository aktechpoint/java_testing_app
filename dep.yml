apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-pod
  labels:
    app: java-app
spec:
  replicas: 2
  strategy:
    type: Recreate   # OK (but RollingUpdate is recommended)
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-container
          image: abhi/javatest
          imagePullPolicy: Always   # 🔥 FIX: Must be capital "Always"
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: java-service
  labels:
    app: java-app
spec:
  type: LoadBalancer   # 🔥 FIX: Capital L & B
  selector:
    app: java-app
  ports:
    - protocol: TCP     # optional but recommended
      port: 80
      targetPort: 8080
